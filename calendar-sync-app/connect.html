<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Noto Sans Thai", "Segoe UI", system-ui, sans-serif;
      margin: 0; padding: 20px; background: #f4f6fb; color: #1a1f2e;
      line-height: 1.6;
    }
    .card {
      max-width: 460px; margin: 0 auto; background: #fff; border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 24px; overflow: hidden;
    }
    h1 { font-size: 1.2rem; margin: 0 0 4px; }
    .sub { color: #6b7280; font-size: .85rem; margin: 0 0 18px; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eef0f4; font-size: .9rem; }
    .row .k { color: #6b7280; }
    .row .v { font-weight: 600; text-align: right; }
    button {
      width: 100%; border: none; border-radius: 10px; padding: 12px; font-size: .95rem;
      font-weight: 600; cursor: pointer; margin-top: 12px; font-family: inherit;
    }
    .primary { background: #1e40af; color: #fff; }
    .primary:disabled { background: #9aa7cf; cursor: default; }
    .danger { background: #fff; color: #dc2626; border: 1px solid #f0c4c4; }
    .ghost { background: #f1f3f9; color: #374151; }
    .status { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: .88rem; display: none; }
    .status.ok { background: #ecfdf5; color: #065f46; display: block; }
    .status.err { background: #fef2f2; color: #991b1b; display: block; }
    .status.info { background: #eff6ff; color: #1e40af; display: block; }
    .muted { color: #9ca3af; font-size: .78rem; margin-top: 14px; text-align: center; }
    label.pick { font-size: .85rem; color: #6b7280; display: block; margin-top: 16px; margin-bottom: 4px; }
    select { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #dfe3ec;
      font-family: inherit; font-size: .9rem; background: #fff; color: #1a1f2e; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff;
      border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>เชื่อมต่อ Google Calendar</h1>
    <p class="sub">Siriraj Rx Shift — ซิงค์เวรของคุณเข้าปฏิทินอัตโนมัติ</p>

    <div id="info">
      <div class="row"><span class="k">บัญชี Google</span><span class="v" id="v-email">…</span></div>
      <div class="row"><span class="k">ปฏิทินปลายทาง</span><span class="v" id="v-cal">…</span></div>
      <div class="row"><span class="k">เวรที่ซิงค์แล้ว</span><span class="v" id="v-count">…</span></div>
      <div class="row"><span class="k">อัปเดตอัตโนมัติ</span><span class="v" id="v-auto">…</span></div>
    </div>

    <label class="pick" for="sel-cal">บันทึกเวรลงปฏิทิน</label>
    <select id="sel-cal"><option>กำลังโหลด…</option></select>
    <button class="ghost" id="btn-newcal" style="margin-top:8px">➕ สร้างปฏิทินแยกเฉพาะเวร</button>

    <button class="primary" id="btn-sync" disabled>ซิงค์เวรเดี๋ยวนี้</button>
    <button class="ghost" id="btn-auto">⚡ อัปเดตอัตโนมัติ (แม้ปิดแอป)</button>
    <button class="ghost" id="btn-test">🧪 ทดสอบ: สร้าง event ตัวอย่าง (พรุ่งนี้)</button>
    <button class="ghost" id="btn-clear">🧹 ล้าง event เวรทั้งหมด (สำหรับเทส)</button>
    <button class="danger" id="btn-revoke">ยกเลิกการเชื่อมต่อ (ถอนสิทธิ์)</button>

    <div class="status" id="status"></div>
    <p class="muted">ยินยอมครั้งเดียว · เวรใหม่จะซิงค์อัตโนมัติ · ถอนสิทธิ์ได้ตลอดเวลา</p>
  </div>

<script>
  // ผู้ส่งข้อมูลเวร = แอปหลัก (เปิดหน้านี้เป็น popup แล้ว postMessage เข้ามา)
  // ดู README §การเชื่อมกับแอปหลัก สำหรับโค้ดฝั่งแอปหลัก
  var MSG_READY  = 'RXSHIFT_CAL_READY';   // หน้านี้ → แอปหลัก: พร้อมแล้ว
  var MSG_SYNC   = 'RXSHIFT_CAL_SYNC';    // แอปหลัก → หน้านี้: {monthValue, shifts}
  var MSG_RESULT = 'RXSHIFT_CAL_RESULT';  // หน้านี้ → แอปหลัก: ผลลัพธ์

  var lastPayload = null;
  var autoOn = false;
  var appName = null;
  var $ = function (id) { return document.getElementById(id); };

  function setStatus(kind, html) {
    var el = $('status');
    el.className = 'status ' + kind;
    el.innerHTML = html;
  }
  function busy(on, label) {
    $('btn-sync').disabled = on;
    if (on) $('btn-sync').innerHTML = '<span class="spinner"></span>' + (label || 'กำลังทำงาน…');
    else $('btn-sync').innerHTML = 'ซิงค์เวรเดี๋ยวนี้';
  }

  // 1) โหลดสถานะ (จุดนี้เองที่ Google จะถามยินยอมครั้งแรก)
  function loadStatus() {
    google.script.run
      .withSuccessHandler(function (r) {
        if (!r || !r.ok) { setStatus('err', 'โหลดสถานะไม่สำเร็จ'); return; }
        $('v-email').textContent = r.email || '-';
        $('v-cal').textContent = r.calendarName || 'ปฏิทินหลัก';
        $('v-count').textContent = (r.syncedCount || 0) + ' รายการ';
        autoOn = !!r.autoSyncOn;
        if (r.appName) appName = r.appName;
        renderAuto();
        $('btn-sync').disabled = false;
      })
      .withFailureHandler(function (e) {
        setStatus('err', 'เกิดข้อผิดพลาด: ' + (e && e.message ? e.message : e));
      })
      .getStatus();
  }

  // 1b) โหลดรายชื่อปฏิทินให้เลือก (รวมปฏิทินย่อย)
  function loadCalendars() {
    google.script.run
      .withSuccessHandler(function (r) {
        if (!r || !r.ok) return;
        var sel = $('sel-cal');
        sel.innerHTML = '';
        r.calendars.forEach(function (c) {
          var o = document.createElement('option');
          o.value = c.id;
          o.textContent = c.name + (c.isPrimary ? ' (ปฏิทินหลัก)' : '');
          // เลือกตัวที่ตั้งไว้ ถ้ายังไม่ตั้งให้ default = ปฏิทินหลัก
          if (r.currentTarget ? (c.id === r.currentTarget) : c.isPrimary) o.selected = true;
          sel.appendChild(o);
        });
      })
      .withFailureHandler(function () { /* เงียบไว้ — ไม่ critical */ })
      .listMyCalendars();
  }

  // เปลี่ยนปฏิทินปลายทาง (ลบ event เดิมจากปฏิทินเก่าให้ กันซ้ำ)
  function onSelectCal() {
    var id = $('sel-cal').value;
    $('sel-cal').disabled = true;
    google.script.run
      .withSuccessHandler(function (r) {
        $('sel-cal').disabled = false;
        var moved = (r && r.movedOff) ? (' (ย้าย event เดิมออก ' + r.movedOff + ' รายการ)') : '';
        setStatus('info', 'เลือกปฏิทินแล้ว — กด "ซิงค์เวรเดี๋ยวนี้" อีกครั้งเพื่อลงปฏิทินนี้' + moved);
        loadStatus();
      })
      .withFailureHandler(function (e) {
        $('sel-cal').disabled = false;
        setStatus('err', 'เปลี่ยนปฏิทินไม่สำเร็จ: ' + (e && e.message ? e.message : e));
      })
      .setTargetCalendar(id);
  }

  // สร้างปฏิทินย่อยใหม่ "Siriraj Rx Shifts" แล้วตั้งเป็นปลายทางเลย
  function createNewCal() {
    $('btn-newcal').disabled = true;
    setStatus('info', '<span class="spinner" style="border-color:#1e40af;border-top-color:transparent"></span>กำลังสร้างปฏิทิน…');
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.ok) {
          google.script.run
            .withSuccessHandler(function () {
              $('btn-newcal').disabled = false;
              setStatus('ok', 'สร้างปฏิทิน "' + r.name + '" แล้ว + ตั้งเป็นปลายทาง — กดซิงค์เพื่อลงปฏิทินนี้');
              loadCalendars();
              loadStatus();
            })
            .withFailureHandler(function () { $('btn-newcal').disabled = false; loadCalendars(); })
            .setTargetCalendar(r.id);
        } else {
          $('btn-newcal').disabled = false;
          setStatus('err', 'สร้างปฏิทินไม่สำเร็จ');
        }
      })
      .withFailureHandler(function (e) {
        $('btn-newcal').disabled = false;
        setStatus('err', 'สร้างไม่สำเร็จ: ' + (e && e.message ? e.message : e));
      })
      .createAppCalendar();
  }

  // 2) รับข้อมูลเวรจากแอปหลัก
  window.addEventListener('message', function (e) {
    var d = e.data || {};
    if (d.type === MSG_SYNC && d.payload) {
      lastPayload = d.payload;
      if (d.payload.appName) {  // แอปหลักส่งชื่อผู้ใช้มาด้วย → เก็บไว้ใช้กับ auto-sync
        appName = d.payload.appName;
        google.script.run.setAppName(appName);
      }
      doSync(lastPayload);
    }
  });

  // แสดงสถานะ auto-sync
  function renderAuto() {
    $('v-auto').textContent = autoOn ? 'เปิด (ทุก ~5 นาที)' : 'ปิด';
    $('btn-auto').textContent = autoOn ? '⏸ ปิดอัปเดตอัตโนมัติ' : '⚡ อัปเดตอัตโนมัติ (แม้ปิดแอป)';
  }

  // เปิด/ปิด auto-sync (background trigger)
  function toggleAuto() {
    $('btn-auto').disabled = true;
    if (!autoOn) {
      google.script.run
        .withSuccessHandler(function (r) {
          $('btn-auto').disabled = false;
          if (r && r.ok) { autoOn = true; renderAuto();
            setStatus('ok', 'เปิดอัปเดตอัตโนมัติแล้ว · ระบบจะเช็คเวรให้ทุก ~' + r.intervalMin + ' นาที แม้คุณปิดแอป'); }
        })
        .withFailureHandler(function (e) { $('btn-auto').disabled = false;
          setStatus('err', 'เปิดไม่สำเร็จ: ' + (e && e.message ? e.message : e)); })
        .installAutoSync(appName, 5);
    } else {
      google.script.run
        .withSuccessHandler(function (r) {
          $('btn-auto').disabled = false;
          if (r && r.ok) { autoOn = false; renderAuto();
            setStatus('info', 'ปิดอัปเดตอัตโนมัติแล้ว (เวรที่ซิงค์ไว้ยังอยู่ในปฏิทิน)'); }
        })
        .withFailureHandler(function (e) { $('btn-auto').disabled = false;
          setStatus('err', 'ปิดไม่สำเร็จ: ' + (e && e.message ? e.message : e)); })
        .removeAutoSync();
    }
  }

  // 3) ซิงค์
  function doSync(payload) {
    if (!payload) {
      setStatus('info', 'ยังไม่มีข้อมูลเวรส่งเข้ามา — กรุณากดซิงค์จากแอปหลัก');
      return;
    }
    busy(true, 'กำลังซิงค์…');
    google.script.run
      .withSuccessHandler(function (r) {
        busy(false);
        if (r && r.ok) {
          setStatus('ok', 'ซิงค์สำเร็จ · เพิ่ม ' + r.created + ' · แก้ ' + r.updated +
                          ' · ลบ ' + r.deleted + ' (ปฏิทิน: ' + (r.calendarName || '-') + ')');
          loadStatus();
          postToOpener(MSG_RESULT, r);
        } else {
          setStatus('err', 'ซิงค์ไม่สำเร็จ: ' + ((r && r.message) || (r && r.error) || 'unknown'));
          postToOpener(MSG_RESULT, r || { ok: false });
        }
      })
      .withFailureHandler(function (e) {
        busy(false);
        setStatus('err', 'ซิงค์ล้มเหลว: ' + (e && e.message ? e.message : e));
      })
      .syncEffectiveShifts(payload);
  }

  // 3b) ล้าง event ทั้งหมด (แต่ยังเชื่อมต่ออยู่) — สำหรับเทสซ้ำ
  function doClear() {
    if (!confirm('ล้าง event เวรทั้งหมดที่ซิงค์ไว้ ออกจากปฏิทิน?\n\n(ยังเชื่อมต่ออยู่ ซิงค์ใหม่ได้ทันที — เหมาะกับการเทสซ้ำ)')) return;
    $('btn-clear').disabled = true;
    setStatus('info', '<span class="spinner" style="border-color:#1e40af;border-top-color:transparent"></span>กำลังล้าง event…');
    google.script.run
      .withSuccessHandler(function (r) {
        $('btn-clear').disabled = false;
        if (r && r.ok) {
          setStatus('ok', 'ล้างแล้ว · ลบ ' + r.removed + ' event (ยังเชื่อมต่ออยู่ กดซิงค์ใหม่ได้เลย)');
          loadStatus();
        } else {
          setStatus('err', 'ล้างไม่สำเร็จ');
        }
      })
      .withFailureHandler(function (e) {
        $('btn-clear').disabled = false;
        setStatus('err', 'ล้างล้มเหลว: ' + (e && e.message ? e.message : e));
      })
      .clearAllSyncedEvents();
  }

  // 4) ถอนสิทธิ์
  function doRevoke() {
    if (!confirm('ยกเลิกการเชื่อมต่อ?\n\nระบบจะลบ event เวรที่สร้างไว้ทั้งหมดออกจากปฏิทินของคุณ และเพิกถอนสิทธิ์ — ครั้งหน้าต้องยินยอมใหม่ถ้าจะใช้อีก')) return;
    setStatus('info', '<span class="spinner" style="border-color:#1e40af;border-top-color:transparent"></span>กำลังลบ event และถอนสิทธิ์…');
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.ok) {
          var note = r.note ? ('<br><small>' + r.note + '</small>') : '';
          setStatus('ok', 'ถอนสิทธิ์เรียบร้อย · ลบ ' + r.removed + ' event' + note +
                          '<br><small>ถอนเพิ่มได้ที่ myaccount.google.com/permissions</small>');
          $('v-count').textContent = '0 รายการ';
          $('btn-sync').disabled = true;
          postToOpener(MSG_RESULT, r);
        } else {
          setStatus('err', 'ถอนสิทธิ์ไม่สำเร็จ');
        }
      })
      .withFailureHandler(function (e) {
        setStatus('err', 'ถอนสิทธิ์ล้มเหลว: ' + (e && e.message ? e.message : e));
      })
      .disconnectAndRevoke();
  }

  function postToOpener(type, data) {
    try {
      // targetOrigin '*' เพราะ origin ของ Apps Script sandbox แปรผัน — ข้อมูลเป็นตารางเวร
      // ของผู้ใช้เอง ไม่ใช่ความลับ และฝั่งรับตรวจ type อยู่แล้ว (ดู README ถ้าต้องการล็อก origin)
      if (window.opener) window.opener.postMessage({ type: type, data: data }, '*');
      if (window.parent && window.parent !== window) window.parent.postMessage({ type: type, data: data }, '*');
    } catch (e) {}
  }

  // ปุ่มทดสอบ — สร้างเวรตัวอย่างวันพรุ่งนี้ 08:00–16:00 (ไม่ต้องพึ่งแอปหลัก)
  // ใช้ยืนยันว่า consent → สร้าง event → ถอนสิทธิ์ ครบวงจร ก่อน wire แอปหลักจริง
  function _sampleShift() {
    var d = new Date(); d.setDate(d.getDate() + 1);
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return {
      date: day + '/' + m + '/' + y, timestamp: '' + y + m + day, range: '08:00-16:00',
      name: '(ทดสอบ)', pos: 'ทดสอบ', shift: 'เวรเช้า', room: '-'
    };
  }
  $('btn-test').addEventListener('click', function () {
    doSync({ monthValue: 'TEST', shifts: [_sampleShift()] });
  });

  $('btn-sync').addEventListener('click', function () { doSync(lastPayload); });
  $('btn-auto').addEventListener('click', toggleAuto);
  $('btn-clear').addEventListener('click', doClear);
  $('btn-revoke').addEventListener('click', doRevoke);
  $('sel-cal').addEventListener('change', onSelectCal);
  $('btn-newcal').addEventListener('click', createNewCal);

  loadStatus();
  loadCalendars();
  postToOpener(MSG_READY, { ok: true });
</script>
</body>
</html>
